<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/images/icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Creative Portfolio</title>
    <style>
      html { touch-action: manipulation; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // Extra Security: Disable right-click and inspection keys
      document.addEventListener('contextmenu', (e) => e.returnValue = false);
      
      document.onkeydown = function(e) {
          // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+C (Copy), Ctrl+X (Cut)
          if (
              e.keyCode == 123 || 
              (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || 
              (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 67 || e.keyCode == 88))
          ) {
              return false;
          }
          
          // Original zoom prevention
          if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
              e.preventDefault();
          }
      };

      // Prevent Copying Actions
      document.addEventListener('copy', (e) => e.preventDefault());
      document.addEventListener('cut', (e) => e.preventDefault());
      document.addEventListener('dragstart', (e) => e.preventDefault());

      // Original zoom prevention for wheel
      document.addEventListener('wheel', function (e) {
        if (e.ctrlKey) {
          e.preventDefault();
        }
      }, { passive: false });

      // Detect if DevTools is open (Optional, but can be useful)
      let devtools = function() {};
      devtools.toString = function() {
        this.opened = true;
      };
      
      console.log('%c Security System Active ', 'background: #222; color: #bada55');
    </script>
  </body>
</html>
